name: Expo

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    health-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Expo Doctor
              run: npx expo-doctor

            - name: Expo Dependency Check
              run: npx expo install --check
